apply from: "${project.rootDir}/base_module.gradle"
android {
    resourcePrefix "video_"
    namespace = "com.knight.kotlin.module_video"
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation (libs.exoplayer)
    implementation (libs.exoplayer.dash)
    implementation (libs.exoplayer.hls)
    //暂时为了适配16kb page sizes  ==》 等后面直接改成 implementation Dependencies.Android.EXOPLAYER_RTMP 即可
    implementation (libs.media3.datasource.rtmp) {
        exclude group: "io.antmedia", module: "rtmp-client"
    }
    implementation "com.github.mcxinyu:LibRtmp-Client-for-Android:v3.2.0.m2"

    implementation (libs.media3.ui)
    implementation (libs.lottie)
    implementation (libs.slf4j)
}
