//library_base 配置文件

apply from: "${project.rootDir}/base_library.gradle"
apply plugin: 'dagger.hilt.android.plugin'
android {
    buildFeatures {
        viewBinding = true
        dataBinding true
    }
    namespace = "com.knight.kotlin.library_widget"
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation (libs.hilt.android)
    kapt (libs.hilt.compiler)
    //kapt Dependencies.JetPack.HILT_ANDROIDX
    implementation project(":nowinandroid:core:library_util")
    implementation project(":nowinandroid:core:library_base")
    api (libs.swipe.recycleview)
    api (libs.base.adapter)
    api (libs.refresh.layout.kernel)
    api (libs.refresh.header.classics)
    api (libs.refresh.footer.classics)
    api (libs.refresh.header.two.level)
    api (libs.magicindictor)

    api (libs.flexbox)
    implementation (libs.shimmer.layout)
    //依赖dataBase 数据库 因本库需要用到数据库里面的实体CityBean
    implementation project(":nowinandroid:core:library_database")

}