//library-aop配置文件

//apply from:'../base_library.gradle'
apply from: "${project.rootDir}/base_library.gradle"
apply plugin : 'com.google.devtools.ksp'

android {
    namespace = "com.knight.kotlin.library_aop"
}

dependencies {
    implementation project(":nowinandroid:core:library_common")
    kapt (libs.gorouter.compiler)
    implementation (libs.hilt.android)
    kapt (libs.hilt.compiler)
    //kapt Dependencies.JetPack.HILT_ANDROIDX
    //非必须项 👇，如果你想自定义切面需要用到，⚠️支持Java和Kotlin代码写的切面
    ksp (libs.android.aop.apt)
}